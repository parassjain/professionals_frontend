<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />

    <!-- Default SEO — overridden per-page by react-helmet-async -->
    <title>ContactHub — Find Trusted Local Professionals in India</title>
    <meta name="description" content="Find trusted local professionals in India — maids, cooks, drivers, plumbers, electricians, brokers and more. Browse real reviews, compare profiles, contact directly on ContactHub." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ContactHub" />
    <meta property="og:title" content="ContactHub — Find Trusted Local Professionals in India" />
    <meta property="og:description" content="Hire verified maids, cooks, drivers, plumbers, electricians, brokers and 50+ other professionals near you. Read real reviews. Contact directly." />
    <meta property="og:url" content="%VITE_SITE_URL%" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ContactHub — Find Trusted Local Professionals in India" />
    <meta name="twitter:description" content="Hire verified local professionals in India. Browse real reviews. Contact directly." />

    <!-- Performance: preconnect to backend and CDN -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
